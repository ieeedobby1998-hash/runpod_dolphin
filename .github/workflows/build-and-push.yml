name: build-and-push

# Builds the llama.cpp GGUF worker image and pushes it to GitHub Container Registry (GHCR).
# No local Docker needed — fork/push this repo and the Action does it.
#
# The image is published at: ghcr.io/<your-org-or-user>/<repo-name>:latest
# (GHCR packages are private by default — after the first push, open the package
#  settings on GitHub and set visibility to Public, or add your RunPod pull creds.)

on:
  push:
    branches: [ main ]
    paths:
      - "Dockerfile"
      - "handler.py"
      - ".github/workflows/build-and-push.yml"
  workflow_dispatch: {}   # allow manual runs from the Actions tab

env:
  IMAGE: ghcr.io/${{ github.repository }}   # e.g. ghcr.io/abrar/dolphin-8x22b-runpod

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write        # required to push to GHCR
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # auto-provided, no manual secret needed

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
